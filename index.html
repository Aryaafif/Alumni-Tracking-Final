<!DOCTYPE html>
<html lang="en">
<head>
    <title>Xrysabut System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function showSearch() {
            document.getElementById('section-login').classList.add('d-none');
            document.getElementById('section-search').classList.remove('d-none');
        }
        function showResult() {
            document.getElementById('section-search').classList.add('d-none');
            document.getElementById('section-result').classList.remove('d-none');
        }
    </script>
</head>
<body class="bg-light">

    <div id="section-login" class="container mt-5">
        <div class="card mx-auto shadow" style="max-width: 400px; border-radius: 15px;">
            <div class="card-body p-5 text-center">
                <h3>Admin Login</h3>
                <input type="text" class="form-control mb-3" placeholder="Username" value="admin">
                <input type="password" class="form-control mb-3" placeholder="Password" value="********">
                <button onclick="showSearch()" class="btn btn-primary w-100">Masuk Akun</button>
            </div>
        </div>
    </div>

    <div id="section-search" class="container d-none text-center" style="margin-top: 15vh;">
        <h2>Pelacakan Alumni</h2>
        <div class="input-group mx-auto mt-4" style="max-width: 500px;">
            <input type="text" class="form-control" placeholder="Ketik Nama Alumni...">
            <button onclick="showResult()" class="btn btn-success">Cari Alumni</button>
        </div>
    </div>

    <div id="section-result" class="container d-none mt-4">
        <h4>Hasil Pelacakan (100+ Data Ditemukan)</h4>
        <table class="table table-striped">
            </table>
    </div>

</body>
</html>
